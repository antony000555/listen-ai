services:
  # 1. Stat (Go)
  stat:
    build: ./stat
    ports:
      - "8002:8002"
    environment:
      - STAT_PORT=8002
      - SQLITE_PATH=/app/data/listenai.db
    networks:
      - listenai-network
    volumes:
      - ./data:/app/data

  # 2. NLP (Python)
  nlp:
    build: ./nlp
    ports:
      - "8001:8001"
    environment:
      - NLP_PORT=8001
    networks:
      - listenai-network

  # 3. Gateway (Node.js)
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    networks:
      - listenai-network
    depends_on:
      - stat
      - nlp
    environment:
      - STAT_URL=http://stat:8002
      - NLP_URL=http://nlp:8001

  # 4. Frontend (Python)
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    networks:
      - listenai-network
    depends_on:
      - gateway
    environment:
      - GATEWAY_URL=http://gateway:8000

networks:
  listenai-network:
    driver: bridge
